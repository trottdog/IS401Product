services:
  # Express backend (API + session auth)
  - type: web
    name: byuconnect-backend
    env: node
    plan: free
    buildCommand: npm install && npm run server:build
    startCommand: npm run server:prod
    envVars:
      - key: NODE_ENV
        value: production
      # DATABASE_URL is provided by the managed Postgres instance below.
      - key: DATABASE_URL
        fromDatabase:
          name: byuconnect-db
          property: connectionString
      # Session secret for production; Render will generate a strong value.
      - key: SESSION_SECRET
        generateValue: true

  # Expo web static site (built output of the Expo app)
  - type: static_site
    name: byuconnect-web
    plan: free
    buildCommand: npm install && npm run expo:static:build
    staticPublishPath: dist
    envVars:
      # After first deploy, set this in the Render Dashboard to the
      # public URL of the byuconnect-backend service (without protocol).
      # Example: byuconnect-backend.onrender.com
      - key: EXPO_PUBLIC_DOMAIN
        value: ""

databases:
  - name: byuconnect-db
    databaseName: byuconnect
    plan: free

